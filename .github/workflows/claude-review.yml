# ==========================================================================
# GitHub Actions: Claude Code PR Review & Code Scanning
# ==========================================================================
# Authentication: Direct Anthropic API key (no Azure/Foundry required)
#
# Prerequisites:
#   1. Anthropic API key stored as repository secret: ANTHROPIC_API_KEY
#   2. Prompt files in prompts/ directory
# ==========================================================================

name: Claude Code PR Review

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "20"
  REPORT_DIR: "claude-review-output"

jobs:
  claude-review:
    name: Claude Code PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ---------------------------------------------------------------
      # Step 1: Checkout repository with full git history
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # Step 2: Install Node.js (required for Claude Code CLI)
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ---------------------------------------------------------------
      # Step 3: Install Claude Code CLI
      # ---------------------------------------------------------------
      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      # ---------------------------------------------------------------
      # Step 4: Create report directory
      # ---------------------------------------------------------------
      - name: Create report directory
        run: mkdir -p "$REPORT_DIR"

      # ---------------------------------------------------------------
      # Step 5: Get PR diff
      # ---------------------------------------------------------------
      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          TARGET="origin/${{ github.base_ref }}"
          git diff "$TARGET"...HEAD > "$REPORT_DIR/pr-diff.txt"
          git diff --name-only "$TARGET"...HEAD > "$REPORT_DIR/changed-files.txt"
          echo "### Changed files:"
          cat "$REPORT_DIR/changed-files.txt"
          echo "### Diff size:"
          wc -l "$REPORT_DIR/pr-diff.txt"

      # ---------------------------------------------------------------
      # Step 6: Claude - Security Scan
      # ---------------------------------------------------------------
      - name: Claude - Security Scan
        run: |
          PROMPT=$(cat prompts/code-scan.md)
          DIFF=$(cat "$REPORT_DIR/pr-diff.txt")
          claude -p \
            --output-format text \
            --max-turns 1 \
            "$PROMPT

          ## Code Diff to Analyze:
          \`\`\`diff
          $DIFF
          \`\`\`" > "$REPORT_DIR/scan-results.md" 2>&1
          echo "=== Security Scan Complete ==="
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------------------------------------------------------------
      # Step 7: Claude - PR Review
      # ---------------------------------------------------------------
      - name: Claude - PR Review
        run: |
          PROMPT=$(cat prompts/pr-review.md)
          DIFF=$(cat "$REPORT_DIR/pr-diff.txt")
          claude -p \
            --output-format text \
            --max-turns 1 \
            "$PROMPT

          ## Code Diff to Review:
          \`\`\`diff
          $DIFF
          \`\`\`" > "$REPORT_DIR/review-results.md" 2>&1
          echo "=== PR Review Complete ==="
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------------------------------------------------------------
      # Step 8: Claude - Code Suggestions
      # ---------------------------------------------------------------
      - name: Claude - Code Suggestions
        run: |
          PROMPT=$(cat prompts/code-suggestions.md)
          DIFF=$(cat "$REPORT_DIR/pr-diff.txt")
          claude -p \
            --output-format text \
            --max-turns 1 \
            "$PROMPT

          ## Code Diff to Analyze:
          \`\`\`diff
          $DIFF
          \`\`\`" > "$REPORT_DIR/suggestions-results.md" 2>&1
          echo "=== Code Suggestions Complete ==="
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------------------------------------------------------------
      # Step 9: Claude - Bug Detection
      # ---------------------------------------------------------------
      - name: Claude - Bug Detection
        run: |
          PROMPT=$(cat prompts/code-fix.md)
          DIFF=$(cat "$REPORT_DIR/pr-diff.txt")
          claude -p \
            --output-format text \
            --max-turns 1 \
            "$PROMPT

          ## Code Diff to Analyze:
          \`\`\`diff
          $DIFF
          \`\`\`" > "$REPORT_DIR/fix-results.md" 2>&1
          echo "=== Bug Detection Complete ==="
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------------------------------------------------------------
      # Step 10: Post combined results as PR comment
      # ---------------------------------------------------------------
      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = process.env.REPORT_DIR;

            const read = (f) => {
              try { return fs.readFileSync(`${dir}/${f}`, 'utf8').trim(); }
              catch { return '_No results generated._'; }
            };

            const scan = read('scan-results.md');
            const review = read('review-results.md');
            const suggestions = read('suggestions-results.md');
            const fixes = read('fix-results.md');
            const changedFiles = read('changed-files.txt');

            const body = [
              '## 🤖 Claude Code Review Report',
              '',
              `**PR:** #${context.issue.number}`,
              `**Run:** [View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Changed files:**`,
              '```',
              changedFiles,
              '```',
              '',
              '---',
              '',
              '### 🔒 Security Scan',
              '',
              scan,
              '',
              '---',
              '',
              '### 📝 Code Review',
              '',
              review,
              '',
              '---',
              '',
              '### 💡 Code Suggestions',
              '',
              suggestions,
              '',
              '---',
              '',
              '### 🐛 Bug Detection & Fix Suggestions',
              '',
              fixes,
              '',
              '---',
              '',
              '*Generated by Claude Code CLI in GitHub Actions*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            console.log('PR comment posted successfully');

      # ---------------------------------------------------------------
      # Step 11: Upload review artifacts
      # ---------------------------------------------------------------
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: claude-review-report
          path: ${{ env.REPORT_DIR }}/
          retention-days: 30
